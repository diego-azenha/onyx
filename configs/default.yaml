# Single source of truth for every number used by src/sbrt (plan checklist §8: "nenhum número
# mágico no código"). References `§N` point at docs/PLANO_TECNICO.md.
seed: 42

h0:                                    # plano §3.1
  ar_order: 10
  min_hist_len: 50
  seasonal_acf_threshold: 0.25
  seasonal_lag_range: [6, 128]
  ar_r2_min_reduction: 0.02            # accept AR(p) only if var(resid)/var(x) <= 1 - this
  nu_clip: [5.0, 50.0]
  quantile_levels: [0.01, 0.05, 0.10, 0.25, 0.75, 0.90, 0.95, 0.99]
  clip_e: [-8.0, 8.0]

state:                                 # plano §4.2
  ewma_lambdas: [0.05, 0.10, 0.30]
  window_sizes: [10, 25, 50, 100, 250]
  exceedance_windows: [50, 250]
  sign_windows: [50, 250]
  vol_adjust: {threshold_rho1_abs: 0.15, lambda_v: 0.06}
  sign_bernoulli: {p0: 0.5, p1_pos: 0.65, p1_neg: 0.35}
  exceedance_bernoulli: {q95: {p0: 0.05, p1: 0.15}, q99: {p0: 0.01, p1: 0.05}}
  dependence_delta_u: 0.3
  skew_window: 250
  quantile_crossing_window: 100
  dependence_window: 100
  hedge_window: 100
  hedge_ewma_lambda: 0.1

cusum:                                 # plano §4.2, tabela #4/#8/#11/#13/#15
  mean_deltas: [0.25, 0.5, 1.0]
  var_ratios_up: [1.5, 2.5]
  var_ratio_down: 0.5
  protected_recent_ages: 8             # not used directly here, kept for symmetry with bayes pruning docs

bayes:                                 # plano §4.3
  hazards: [0.02, 0.01, 0.0025]        # 1/50, 1/100, 1/400 -- 1/50 acrescentado (docs/DIAGNOSTICO_TS_AUC.md,
                                        # direcao 4): reacao mais rapida em t baixo, onde a mediana de
                                        # tau_index de treino e 184 e o quartil inferior e 67
  max_candidates: 48
  protect_recent: 8
  prior: {mu0: 0.0, kappa0: 0.5, nu0: 2.0, sigma0_sq: 1.5}
  logw_renorm_threshold: 600.0

conformal:                            # plano §4.2 #23
  epsilons: [0.05, 0.1, 0.2, 0.4]
  reset_epsilons: [0.05, 0.1, 0.2, 0.4]

rank_twosample:                       # R4 (docs/PARECER_AUDITORIA_ONYX.md §6-R4): duas amostras
  windows: [25, 100]                  # rank-based janela-vs-histórico -- analogo causal de 2025

dependence:                           # P1 (docs/HISTORICO.md §8): dependencia nao-linear
  windows: [50, 100]                  # w050 de volta: ela sai no V5 (poda vale +0,0027 medido com
                                      # 3 sementes limpas), mas o V5 NAO e o conjunto empacotado --
                                      # V5+mrep mede pior que mrep sozinho. Ver BACKLOG_TSAUC.md.
  mass_window: 100                    # massa multi-lag Sum rho_k^2
  mass_max_lag: 5

lmoments:                             # P2: forma de cauda dinamica. PODADO de default_blocks em
  windows: [50, 100]                  # 2026-07-22 (0,51% do xs-SHAP por ~65us/passo). A poda faz
                                      # parte do pacote medido em +0,0027. Config preservada.

bocpd:                                # ESTACIONADO fora de default_blocks: entrou no V5, que regrediu
  r_max: 256                          # por R0 (§9). Config preservada para reabrir o experimento que
                                      # separa BOCPD da poda (V4 + BOCPD). ~30 us/passo medido.
  hazard_lambda: 250.0                # H = 1/lambda
  alpha0: 2.0                         # prior IG -> preditiva t_4 (variancia 1, robusta a cauda)
  beta0: 1.0
  recent_k: 5                         # cp_prob = P(run-length < 5)

varloc:                               # P3 (docs/INVESTIGACAO_FALHAS_V3.md): variancia localizada
  scales: [10, 25, 50, 100, 250]      # max/min do z de variancia sobre escalas (localiza o changepoint)
  recent: 25                          # contraste recente-vs-defasado
  lagged: 100

jumps:                                # P4 (docs/INVESTIGACAO_FALHAS_V3.md): bipower/saltos + leverage
  windows: [50, 100]                  # RV/BV (razao de salto), semivariancia RS+/RS-, leverage

trajectory:                           # F4+F9 (docs/BACKLOG_TSAUC.md): forma da rampa do estatistico.
                                      # NAO esta em scorer.py:default_blocks ainda -- braco proprio.
  ewma_lambda: 0.1                    # janela efetiva ~10 passos para inclinacao/monotonicidade
  threshold: 2.0                      # os estatisticos rastreados sao z-scores calibrados (F1),
                                      # entao 2.0 e um limiar livre de escala -- ~2 desvios do nulo
                                      # da PROPRIA serie, nao um numero absoluto arbitrario.
  track:                              # feature rastreada -> alias curto (entra no nome da saida).
                                      # Curto de proposito: cada item multiplica a largura por 5.
                                      # Escolhidos por xs_shap alto no V2 e por serem acumuladores de
                                      # evidencia (nao instantaneos): variancia calibrada e o canal
                                      # dominante (beta=+0,312), cusum_var_up e o CUSUM mais forte,
                                      # bayes_lo e a evidencia posterior.
    accum_window_var_ln_w100_cal: var
    cusum_var_up_r150: cvar
    bayes_lo_h0100: blo

mismatch:                             # F2 (docs/BACKLOG_TSAUC.md): o filtro congelado ainda vale?
                                      # NAO esta em scorer.py:default_blocks ainda -- entra como
                                      # braco proprio, depois que o R0 de F1 fechar.
  windows: [10, 25, 50]               # portmanteau sobre `e` puro (brancura multi-lag do AR(10)).
                                      # Janelas curtas de proposito: o alvo e 25<m pos-quebra, nao
                                      # m minusculo (teto causal em t<=50 e real).
  max_lag: 5                          # L do Sum rho_k^2
  arch_windows: [25, 50]              # McLeod-Li sobre e^2 (ARCH multi-lag; dep_sqrho1 so ve lag 1)
  arch_max_lag: 5
  cusum_delta: 0.3                    # mesma escala de state.dependence_delta_u, que ja e o CUSUM
                                      # de escore lag-1; aqui o escore e agregado sobre 1..L

# --- eixos NAO COBERTOS (docs/BACKLOG_TSAUC.md) ---
# Os tres blocos abaixo NAO estao em scorer.py:default_blocks. Cada um entra como braco proprio de
# R0, um por vez, com bucket-alvo 151-400 declarado a priori (48,7% do peso da metrica) e depois de
# passar por `python scripts/xs_redundancy.py --extra-blocks <bloco> --vs-all <prefixo>`.
# A disciplina vem de tres regressoes medidas (V5 -0,0042; F1 -0,0069; centragem +0,0018 = ruido):
# largura sem ordenacao nova DILUI o sorteio de feature_fraction=0,8 e machuca.

spectral:                             # forma (nao nivel) do espectro de `e` -- state/spectral.py
  n_bins: 6                           # K bandas iguais de (0,pi); K bem menor que a janela efetiva
  decay: 0.88                         # DFT de tempo curto, janela ~8 passos (resolucao)
  alpha_fast: 0.10                    # media de Welch sobre ~10 periodogramas
  alpha_slow: 0.03                    # ~33 periodogramas. MEDIDO: sem esta promediacao o
                                      # periodograma cru tem dp = media (exponencial) e a entropia
                                      # de H0 sai 0,81 +- 0,10 -- ruido MAIOR que o efeito de um
                                      # AR(1) com phi=0,6. A diferenca fast-slow e a
                                      # "reorganizacao" propriamente dita (contraste interno, sem
                                      # constante estimada por serie -- ver a autopsia do F1)
  low_bins: 2                         # fracao de potencia no terco inferior do espectro

ordinal:                              # padroes ordinais de Bandt-Pompe -- state/ordinal.py
  m3_windows: [50, 100]               # 6 simbolos: janela curta ainda estima bem
  m4_windows: [100]                   # 24 simbolos: precisa de janela longa
  min_counts_m3: 20                   # emite com janela PARCIAL a partir daqui. O vies de contagem
  min_counts_m4: 30                   # da entropia depende so de n, e n e igual para todas as
                                      # series no mesmo t -> neutro por C1. Esperar a janela encher
                                      # custaria NaN em todo o bucket 51-150 em troca de nada.

multirep:                             # ponte tipo-integral (KPSS/Cramer-von Mises) -- state/multirep.py
  windows: [50, 100]                  # sobre tres representacoes: `e`, `e^2` e o PIT contra o H0
  min_n: 20                           # abaixo disso a ponte e ruido de amostra pequena

# --- proposta V2 (docs/PROPOSTA_FEATURES_V2.md) ---
mmd:                                  # F3: MMD de kernel via Random Fourier Features (NEWMA)
  n_features: 64                      # D; custo medido ~9 us/passo (D=64), ~11 us (D=128)
  bandwidth: 1.0                      # e ja e padronizado por sigma_e -> sigma=1 e a escala natural
  lambda_vfast: 0.08                  # janela efetiva ~12 passos -- cobre o regime t<=50, onde
                                      # fast/slow ainda nao aqueceram (docs/RESULTADOS_FEATURES_V2 §3)
  lambda_fast: 0.02                   # janela efetiva ~50 passos
  lambda_slow: 0.005                  # janela efetiva ~200 passos

multiscale:                           # F4: energia por escala (Haar diadico causal), ~4 us/passo
  n_scales: 5                         # escala j produz um coeficiente a cada 2^(j+1) amostras
  ewma_lambda: 0.05
  warmup_min_coeffs: 3                # NaN ate a escala ter 3 coeficientes (honesto, nao inventado)

h0_fingerprint:                       # F2: descritores estendidos de H0, custo ZERO por passo
  hill_frac: 0.05                     # fracao superior de |e| usada pelo estimador de Hill
  acf_max_lag: 10
  hurst_scales: [1, 2, 4, 8, 16]
  volvol_window: 50
  # F5/F0.d: precursores de critical slowing down na CAUDA do historico. Usados APENAS pelo gate
  # ce6_history_classifier.py --with-precursors; NAO entram em compute_fingerprint (nao sao feature
  # de producao) ate o gate mostrar sinal. Ver state/fingerprint.py:compute_precursors.
  precursor_tail_frac: 0.4            # fracao final do historico onde o precursor e procurado
  precursor_window: 100               # janela das estimativas rolantes de AC(1)/variancia/assimetria

calibration:                          # F1: nulo por serie medido sobre o proprio historico
  enabled: true
  shrink_pseudo: 10.0                 # encolhe sd empirico -> teorico i.i.d. com peso n_eff/(n_eff+10)
  # --- F1.a (docs/BACKLOG_TSAUC.md): nulo de estatisticas RECURSIVAS por replicas com reinicio ---
  transient_restart_every: 100        # K: passos por replica. MEDIDO: o CUSUM leva ~75 passos para
                                      # atingir a distribuicao estacionaria (t=25 -> 72% da media
                                      # estacionaria, t=50 -> 90%, t=75 -> 99%), entao K=100 cobre o
                                      # transiente inteiro. Com n_h mediano de 3000 da ~30 replicas
                                      # independentes por serie; custo = 1 passada pelo historico.
  transient_smooth_w: 5               # suavizacao da curva de transiente ao longo de t (a curva
                                      # verdadeira e suave; suavizar troca vies desprezivel por
                                      # ~2x menos ruido de estimacao por serie)
  transient_max_reps: 20              # teto de replicas. O custo e linear em n_reps e o erro cai com
                                      # sqrt(n_reps) -- e ainda passa por encolhimento e suavizacao
                                      # (janela 5 => ~100 amostras efetivas por ponto da curva).
                                      # Sem teto, n_h=5000 pagaria 50 replicas por ganho desprezivel.
  recursive_features: {}              # estatistica recursiva -> como o nulo dela escala em t.
                                      # `none` = recursao refletida (nulo estacionario apos o
                                      # transiente); `cumsum` = acumulador sem reset (mu ~ t, dp ~ raiz(t)).
                                      #
                                      # VAZIO POR MEDICAO (2026-07-21, docs/BACKLOG_TSAUC.md).
                                      # Os bracos F1.a (cusum_dep_*, accum_*_rho1_fz, dep_mass_evol)
                                      # e F1.b-1 (conformal_logm_*) foram construidos, medidos por R0
                                      # contra o V4 e REGREDIRAM: Delta geral -0,0069
                                      # [-0,0125, -0,0018], IC exclui 0 CONTRA, e 50<t<=150 em
                                      # -0,0136 [-0,0222, -0,0053].
                                      # Causa provavel, medida antes do R0 por scripts/xs_redundancy.py:
                                      # as colunas calibradas reproduzem a ordenacao transversal das
                                      # cruas (corr 0,92-0,98), entao nao acrescentam ordenacao -- so
                                      # largura, e largura sem sinal dilui o sorteio de
                                      # feature_fraction=0,8 (docs/NOTAS_AGENTES.md secao 7).
                                      # A maquinaria (replicas com reinicio, tabela de transiente,
                                      # kind=cumsum) continua testada e pronta; reabrir um braco e
                                      # acrescentar linhas aqui. Antes disso, rodar o rastreio:
                                      # so `conformal_logm_abs_reset` (corr 0,695) reordena de fato.

features:
  warmup_min_n: 5                     # below this, window/EWMA-derived stats emit NaN

lightgbm:                              # plano §8.3
  learning_rate: 0.05
  num_leaves: 63
  max_depth: -1
  min_data_in_leaf: 200
  feature_fraction: 0.8
  bagging_fraction: 0.8
  bagging_freq: 1
  lambda_l2: 5.0
  n_estimators_cap: 1500
  early_stopping_rounds: 100
  max_bin: 255
  deterministic: true
  force_row_wise: true
  train_num_threads: 8
  predict_num_threads: 1
  n_folds: 5
  feval_max_valid_rows: null           # R2 (parecer §6-R2): subamostra determinística do feval de
                                        # AUC-por-passo. MEDIDO (retreino real, 2026-07-20): uma
                                        # subamostra fixa de 150k linhas usada como criterio de
                                        # parada por ~150-200 rodadas sofre "winner's curse" --
                                        # o round-argmax fica otimisticamente enviesado para ESSA
                                        # subamostra fixa e nao generaliza para o fold inteiro.
                                        # Usar o fold inteiro reduz essa fonte de ruido; reativar
                                        # (>0) só se o custo por rodada em datasets maiores exigir e
                                        # com subamostra bem maior (>= algumas centenas de milhares).
  bag_seeds: [777, 101, 202, 303]      # bagging de sementes FUNDIDAS (src/sbrt/model/fuse.py).
                                        # +0,0040 medido; K=4 captura 83% do ganho disponivel
                                        # (satura em +0,0048 com K=7). Custa 4x o tempo de TREINO
                                        # na nuvem; o dataset e construido uma vez so.
                                        # A semente 42 fica de fora: contaminada por selecao, ela e
                                        # a PIOR para este conjunto de features (docs/BACKLOG_TSAUC.md).
  early_stopping_metric: logloss       # ver comentário em src/sbrt/config.py:LightGBMConfig --
                                        # "ts_auc_by_t" sozinho (mesmo sem subamostra) regrediu a
                                        # TS-AUC OOF real (Delta -0.0099, IC exclui 0); "logloss"
                                        # reproduz o comportamento original, validado neste retreino
                                        # (Delta -0.0014, IC inclui 0 -- indistinguível do baseline).

rank:                                   # R3 (docs/PARECER_AUDITORIA_ONYX.md §6-R3): objetivo de
  objective: lambdarank                 # ranking por grupo t, membro PARALELO do ensemble binario
  label_gain: [0, 1]                    # (nao substitui) -- ver model/train.py:train_rank
  truncation_level_cap: 300             # ver comentario em config.py:RankObjectiveConfig -- grupos
                                         # de t<=100 chegam a ~8000 linhas/fold; sem cap o treino
                                         # trava (custo ~group_size*truncation_level por grupo)

thinning:                              # plano §8.1
  full_until: 100
  step_101_400: 2
  step_401_plus: 4

model:
  mode: supervised                     # fallback | supervised — supervised requires artifacts/models/vN
  dataset_n_jobs: -1                   # paralelismo entre séries ao construir o dataset de treino (§8.1);
                                        # -1 = todos os núcleos (joblib); 1 = serial (comportamento original)

fallback:                              # plano §8.5 — caminho de emergência determinístico
  w_lo: 0.9                            # peso do log-odds bayesiano (hazard 1/400)
  w_cusum: 0.4                         # peso do max do banco de CUSUM (via sqrt(2*LLR), escala z)
  w_conformal: 0.3                     # peso do log-martingale conformal (variante reset)
  bias: 0.0                            # a calibrar no treino para mediana 0.5 em séries sem quebra (§8.5)

gates:                                  # plano §10 (tabela revisada) e §11.1 — COMPORTAMENTAIS, nunca TS-AUC (§9.0)
  drift_slope_abs_max: 1.0e-4
  # 300 era um alvo de engenharia conservador, não o orçamento real. Medido: build de features
  # ~233us/passo + predict ~330us estimado = ~560us/passo; orçamento real (15h/semana / 1e7 passos)
  # = ~5400us/passo -> ~16x de folga. Ver plano_acao_v1_para_v2.md §1.4. Subir este número não é
  # licença para inflar custo sem necessidade, mas 300 estava barrando trabalho legítimo.
  latency_budget_us_per_step: 1500
  t1:  {median_min: 0.65, control_median_max: 0.25, t_from: 50}
  t2:  {mean_prebreak_max: 0.35}
  t3:  {gap_min: 0.15, t_offset: 200}
  t4:  {median_min: 0.75, control_median_max: 0.20, t_offset: 15}
  t5:  {gap_min: 0.35, t_offset: 100}
  t5b: {gap_min: 0.20, t_offset: 200}
  t6:  {mean_max: 0.40}
  t7:  {gap_min: 0.20, t_offset: 150}
  t8:  {gap_min: 0.15, t_offset: 200}
  t9:  {final_max: 0.35, decay_min: 0.1}
  t10: {mean_max: 0.40}
  t11: {}
  t12: {}
  t12b: {}
  t13: {decay_min: 0.15}

submission:                             # plano §9.3 — G-0/G-mono/G-peso decididos por submissão oficial,
  log_path: "artifacts/reports/submission_log.md"   # nunca por número calculado localmente

postprocess:
  mode: free                           # free | hold | soft | ema — plano §7
  soft_decay: 0.02
  ema_alpha: 0.7
